<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Meridian Report — A Private Compendium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink:       #0A0D0A;
  --paper:     #F3EEE2;
  --paper2:    #E9E2D2;
  --paper3:    #DCD3BE;
  --rule:      #2D3A32;
  --rule-soft: #8A8270;
  --forest:    #0F2A1F;
  --forest2:   #1B3A2A;
  --moss:      #3C5242;
  --gold:      #B8894E;
  --gold-lt:   #D4A76A;
  --gold-dk:   #8B6432;
  --crimson:   #7A1F20;
  --oxblood:   #5C1614;
  --mute:      #5E5A4E;
  --mute2:     #8A8270;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Cormorant Garamond',Georgia,serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  font-size:17px;
  line-height:1.6;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(184,137,78,.04) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(15,42,31,.03) 0%, transparent 50%);
}

.ribbon{
  background:var(--ink);
  color:var(--paper);
  padding:10px 2rem;
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;
  letter-spacing:.22em;
  text-transform:uppercase;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--gold-dk);
  gap:1rem;
}
.ribbon-l{color:var(--gold-lt)}
.ribbon-c{color:var(--paper3);flex:1;text-align:center}

/* ── MINIMAL REFRESH BUTTON IN RIBBON ── */
.ribbon-refresh{
  background:transparent;
  border:1px solid var(--gold-dk);
  color:var(--gold-lt);
  font-family:'JetBrains Mono',monospace;
  font-size:9.5px;
  letter-spacing:.18em;
  text-transform:uppercase;
  padding:4px 12px;
  cursor:pointer;
  transition:all .15s;
  display:inline-flex;
  align-items:center;
  gap:6px;
  white-space:nowrap;
}
.ribbon-refresh:hover{background:var(--gold-dk);color:var(--paper)}
.ribbon-refresh:disabled{opacity:.5;cursor:not-allowed}
.ribbon-refresh .arrow{display:inline-block;transition:transform .5s ease}
.ribbon-refresh.loading .arrow{animation:spin 1.2s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.ribbon-status{
  color:var(--paper3);
  font-size:9.5px;
  font-style:normal;
  letter-spacing:.12em;
  display:none;
}
.ribbon-status.visible{display:inline}
.ribbon-status.error{color:#F0A0A0}

.masthead{
  padding:2.5rem 2rem 1.75rem;
  border-bottom:3px double var(--rule);
  background:linear-gradient(180deg,var(--paper) 0%,var(--paper) 85%,var(--paper2) 100%);
  position:relative;
}
.mast-inner{max-width:1180px;margin:0 auto;text-align:center}
.mast-eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  letter-spacing:.4em;
  text-transform:uppercase;
  color:var(--gold-dk);
  margin-bottom:1rem;
  display:flex;
  gap:1rem;
  align-items:center;
  justify-content:center;
}
.mast-eyebrow::before,.mast-eyebrow::after{
  content:'';flex:0 0 60px;height:1px;background:var(--gold-dk)
}
.mast-title{
  font-family:'Cormorant Garamond',serif;
  font-weight:500;
  font-size:64px;
  color:var(--ink);
  letter-spacing:-.015em;
  line-height:1;
  margin-bottom:0;
}

.section-nav{
  background:var(--paper);
  border-bottom:1px solid var(--rule-soft);
  padding:0 2rem;
}
.section-nav-inner{
  max-width:1180px;
  margin:0 auto;
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:0;
}
.section-link{
  padding:18px 1.85rem;
  font-family:'Cormorant Garamond',serif;
  font-size:18px;
  font-weight:500;
  color:var(--ink);
  text-decoration:none;
  cursor:pointer;
  transition:all .2s;
  letter-spacing:.01em;
  position:relative;
  border:none;
  background:none;
}
.section-link:hover{color:var(--forest)}
.section-link.active{
  color:var(--forest);
  font-style:italic;
}
.section-link.active::after{
  content:'';position:absolute;bottom:-1px;left:1.25rem;right:1.25rem;
  height:2px;background:var(--gold);
}
.section-link + .section-link{border-left:1px solid var(--paper3)}
.section-disabled{color:var(--mute2);cursor:default;font-style:italic;position:relative}
.section-disabled::after{
  content:'Soon';
  font-family:'JetBrains Mono',monospace;
  font-size:8px;
  letter-spacing:.15em;
  text-transform:uppercase;
  color:var(--gold-dk);
  display:block;
  margin-top:-2px;
  font-style:normal;
}

.subsection-nav{
  background:var(--paper2);
  border-bottom:1px solid var(--rule-soft);
  padding:0 2rem;
}
.subsection-nav-inner{
  max-width:1180px;
  margin:0 auto;
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:0;
}
.subsection-link{
  padding:12px 1.3rem;
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;
  font-weight:500;
  color:var(--mute);
  text-transform:uppercase;
  letter-spacing:.15em;
  text-decoration:none;
  cursor:pointer;
  transition:all .2s;
  position:relative;
  border:none;
  background:none;
}
.subsection-link:hover{color:var(--forest)}
.subsection-link.active{
  color:var(--forest);
  font-weight:600;
}
.subsection-link.active::after{
  content:'';position:absolute;bottom:-1px;left:1rem;right:1rem;
  height:1.5px;background:var(--gold);
}
.subsection-link.disabled{color:var(--mute2);cursor:default;opacity:.55}
.subsection-link.disabled::after{
  content:'·Soon';
  font-size:8px;
  letter-spacing:.1em;
  color:var(--gold-dk);
  margin-left:4px;
  position:static;
  background:none;
  height:auto;
  opacity:.85;
}

/* ── LAYOUT — narrower sidebar ── */
.wrap{
  max-width:1180px;
  margin:0 auto;
  padding:2.25rem 2rem 3rem;
  display:grid;
  grid-template-columns:1fr 230px;
  gap:2.5rem;
  align-items:start;
}

.section-hdr{
  margin-bottom:1.75rem;
  padding-bottom:1.25rem;
  border-bottom:1px solid var(--rule-soft);
}
.section-kicker{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  letter-spacing:.28em;
  text-transform:uppercase;
  color:var(--gold-dk);
  margin-bottom:10px;
}
.section-headline{
  font-family:'Cormorant Garamond',serif;
  font-size:44px;
  font-weight:500;
  color:var(--ink);
  line-height:1.05;
  letter-spacing:-.015em;
  margin-bottom:8px;
}
.section-deck{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-weight:400;
  font-size:19px;
  color:var(--mute);
  line-height:1.5;
  max-width:680px;
}

/* ── REGION TOGGLE (United States / Global) ── */
.region-toggle{
  display:inline-flex;
  gap:0;
  margin-top:6px;
  border:1px solid var(--rule);
  background:var(--paper2);
}
.region-btn{
  background:transparent;
  border:none;
  padding:9px 22px;
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;
  font-weight:500;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--mute);
  cursor:pointer;
  transition:all .18s;
  display:inline-flex;
  align-items:center;
  gap:10px;
  position:relative;
}
.region-btn + .region-btn{border-left:1px solid var(--rule-soft)}
.region-btn:hover{color:var(--forest);background:var(--paper)}
.region-btn.on{
  background:var(--forest);
  color:var(--paper);
  font-weight:600;
}
.region-btn.on .region-count{color:var(--gold-lt);border-color:var(--gold-dk)}
.region-count{
  font-family:'JetBrains Mono',monospace;
  font-size:9.5px;
  letter-spacing:.08em;
  color:var(--mute2);
  padding:1px 7px;
  border:1px solid var(--rule-soft);
  background:rgba(0,0,0,.02);
  min-width:22px;
  text-align:center;
}

.search-bar{
  display:flex;
  gap:0;
  margin-bottom:1.5rem;
  background:var(--paper2);
  border:1px solid var(--rule-soft);
}
.search-input{
  flex:1;
  border:none;
  background:transparent;
  padding:12px 16px;
  font-family:'Cormorant Garamond',serif;
  font-size:17px;
  color:var(--ink);
  outline:none;
}
.search-input::placeholder{color:var(--mute2);font-style:italic}
.search-icon{
  padding:0 16px;
  display:flex;
  align-items:center;
  color:var(--mute);
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;
  letter-spacing:.15em;
  border-left:1px solid var(--rule-soft);
  background:var(--paper);
  text-transform:uppercase;
}

.feed-meta-row{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  margin-bottom:1rem;
}
.feed-label{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:22px;
  color:var(--ink);
}
.feed-count{
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;
  color:var(--mute);
  letter-spacing:.12em;
  text-transform:uppercase;
}

.notice{
  padding:.9rem 1.1rem;
  margin-bottom:1rem;
  font-size:15px;
  line-height:1.55;
  border-left:3px solid;
  font-style:italic;
  font-family:'Cormorant Garamond',serif;
}
.notice.info{background:rgba(184,137,78,.09);border-color:var(--gold);color:var(--gold-dk)}
.notice.err{background:rgba(122,31,32,.06);border-color:var(--crimson);color:var(--oxblood)}

.card{
  background:var(--paper);
  border:1px solid var(--rule-soft);
  margin-bottom:14px;
  padding:1.4rem 1.6rem 1.15rem;
  position:relative;
  transition:all .25s ease;
  animation:fadeIn .5s ease forwards;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card:hover{
  border-color:var(--forest);
  box-shadow:0 4px 20px rgba(15,42,31,.1);
  transform:translateY(-1px);
}
.card::before{
  content:'';position:absolute;top:0;left:0;width:100%;height:2px;
  background:var(--moss);
}
.card.ta::before{background:var(--forest)}
.card.tm::before{background:var(--gold)}
.card.ti::before{background:var(--moss)}
.card.td::before{background:var(--crimson)}

.card-top{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
  padding-bottom:8px;
  border-bottom:1px dotted var(--rule-soft);
  flex-wrap:wrap;
}
.prio{
  font-family:'JetBrains Mono',monospace;
  font-size:9.5px;
  font-weight:600;
  letter-spacing:.18em;
  text-transform:uppercase;
  padding:3px 10px;
  border:1px solid;
}
.prio-a{color:var(--forest);border-color:var(--forest);background:rgba(15,42,31,.05)}
.prio-m{color:var(--gold-dk);border-color:var(--gold);background:rgba(184,137,78,.08)}
.prio-i{color:var(--moss);border-color:var(--moss);background:rgba(60,82,66,.07)}
.prio-d{color:var(--oxblood);border-color:var(--crimson);background:rgba(122,31,32,.05)}
.sector-tag{
  font-family:'JetBrains Mono',monospace;
  font-size:9.5px;
  letter-spacing:.15em;
  text-transform:uppercase;
  color:var(--mute);
  padding:3px 8px;
}
.value-stamp{
  font-family:'Cormorant Garamond',serif;
  font-weight:600;
  font-size:16px;
  color:var(--gold-dk);
  padding:1px 10px;
  border:1px solid var(--gold);
  background:rgba(184,137,78,.06);
  margin-left:auto;
  font-style:italic;
}
.card-date{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:var(--mute2);
  letter-spacing:.1em;
  margin-left:auto;
}
.value-stamp + .card-date{margin-left:0}

.card-title{
  font-family:'Cormorant Garamond',serif;
  font-size:28px;
  font-weight:500;
  color:var(--ink);
  line-height:1.15;
  margin-bottom:10px;
  letter-spacing:-.008em;
}
.card-summary{
  font-size:17px;
  color:var(--ink);
  line-height:1.55;
  margin-bottom:14px;
  font-family:'Cormorant Garamond',serif;
  font-weight:400;
}
.card-kw{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-bottom:14px;
  padding-top:10px;
  border-top:1px dotted var(--rule-soft);
  align-items:center;
}
.kw-lbl{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--mute2);
  padding-right:4px;
}
.kw{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:var(--forest2);
  background:var(--paper2);
  border:1px solid var(--rule-soft);
  padding:2px 8px;
  letter-spacing:.05em;
}
.card-foot{
  display:flex;
  align-items:center;
  gap:12px;
  padding-top:10px;
  border-top:1px solid var(--rule-soft);
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;
  color:var(--mute);
  flex-wrap:wrap;
}
.src-name{
  display:flex;
  align-items:center;
  gap:6px;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.src-name::before{
  content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--gold);
}
.card-cat{
  color:var(--mute2);
  font-style:italic;
  font-family:'Cormorant Garamond',serif;
  font-size:15px;
  letter-spacing:0;
  text-transform:none;
}
.card-link{
  margin-left:auto;
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--forest);
  text-decoration:none;
  border:1px solid var(--forest);
  padding:5px 12px;
  transition:all .15s;
  font-weight:600;
}
.card-link:hover{background:var(--forest);color:var(--paper)}

.empty{
  background:var(--paper2);
  border:1px dashed var(--rule-soft);
  padding:4rem 2rem;
  text-align:center;
}
.empty h2{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:32px;
  color:var(--ink);
  margin-bottom:12px;
  font-weight:500;
}
.empty p{
  font-size:17px;
  color:var(--mute);
  max-width:460px;
  margin:0 auto;
  font-style:italic;
  line-height:1.55;
  font-family:'Cormorant Garamond',serif;
}
.empty .ornament-line{
  color:var(--gold);
  margin:1.5rem 0;
  letter-spacing:.5em;
  font-size:14px;
}

.sidebar{display:flex;flex-direction:column;gap:1.25rem}
.panel{
  background:var(--paper);
  border:1px solid var(--rule-soft);
  position:relative;
}
.panel::before{
  content:'';position:absolute;top:-1px;left:-1px;right:-1px;height:2px;background:var(--forest);
}
.ph{
  padding:11px 12px 9px;
  font-family:'JetBrains Mono',monospace;
  font-size:9.5px;
  font-weight:600;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--forest);
  border-bottom:1px dotted var(--rule-soft);
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.ph-ornament{color:var(--gold);font-size:9px}

/* ── ARTICLE COUNT (single-stat compact panel) ── */
.count-box{
  padding:1.1rem 1rem;
  text-align:center;
  background:var(--forest);
}
.count-n{
  font-family:'Cormorant Garamond',serif;
  font-size:42px;
  font-weight:400;
  font-style:italic;
  color:var(--gold-lt);
  line-height:1;
  margin-bottom:4px;
}
.count-l{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;
  color:var(--paper2);
  letter-spacing:.18em;
  text-transform:uppercase;
}

.fl{display:flex;flex-direction:column;gap:1px;background:var(--rule-soft)}
.fb{
  background:var(--paper);
  border:none;
  padding:9px 12px;
  font-family:'Cormorant Garamond',serif;
  font-size:15px;
  cursor:pointer;
  color:var(--ink);
  text-align:left;
  display:flex;
  align-items:center;
  justify-content:space-between;
  transition:all .15s;
}
.fb:hover{background:var(--paper2);padding-left:16px}
.fb.on{
  background:var(--forest);
  color:var(--paper);
  font-weight:500;
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
}
.fb.on::before{content:'▸ ';color:var(--gold-lt);margin-right:4px}
.fc{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:var(--mute);
  letter-spacing:.1em;
}
.fb.on .fc{color:var(--gold-lt)}

.footer{
  margin-top:3rem;
  padding:2.5rem 2rem;
  text-align:center;
  border-top:3px double var(--rule);
  background:var(--paper2);
}
.footer-mark{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:20px;
  color:var(--mute);
  margin-bottom:8px;
  font-weight:400;
}
.footer-est{
  font-family:'JetBrains Mono',monospace;
  font-size:9.5px;
  color:var(--mute2);
  letter-spacing:.3em;
  text-transform:uppercase;
}

@media(max-width:900px){
  .wrap{grid-template-columns:1fr;padding:1.5rem 1rem}
  .sidebar{order:-1}
  .mast-title{font-size:44px}
  .section-headline{font-size:32px}
  .ribbon{flex-direction:column;gap:.4rem;text-align:center;padding:10px 1rem}
  .ribbon-c{order:3}
  .section-nav-inner,.subsection-nav-inner{justify-content:flex-start;overflow-x:auto;flex-wrap:nowrap}
  .section-link{padding:14px 1.2rem;white-space:nowrap}
  .section-link+.section-link{border-left:1px solid var(--paper3)}
  .subsection-link{padding:10px 1rem;white-space:nowrap}
}
</style>
</head>
<body>

<div class="ribbon">
  <div class="ribbon-l">Volume I · Issue I</div>
  <div class="ribbon-c" id="current-date"></div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="ribbon-status" id="ribbon-status"></span>
    <button class="ribbon-refresh" id="rbtn" onclick="loadArticles()">
      <span class="arrow">↻</span> Refresh
    </button>
  </div>
</div>

<header class="masthead">
  <div class="mast-inner">
    <div class="mast-eyebrow">A Private Compendium</div>
    <h1 class="mast-title">The Meridian Report</h1>
  </div>
</header>

<nav class="section-nav">
  <div class="section-nav-inner">
    <button class="section-link active" data-section="ma" onclick="switchSection('ma')">M&amp;A Activity</button>
    <button class="section-link section-disabled" title="Coming soon">Politics</button>
    <button class="section-link section-disabled" title="Coming soon">Real Estate</button>
    <button class="section-link section-disabled" title="Coming soon">Watches</button>
    <button class="section-link section-disabled" title="Coming soon">Golf</button>
  </div>
</nav>

<nav class="subsection-nav" id="subsection-nav">
  <div class="subsection-nav-inner">
    <button class="subsection-link active" data-industry="construction" onclick="switchIndustry('construction')">Construction Materials</button>
    <button class="subsection-link disabled" title="Coming soon">Technology</button>
    <button class="subsection-link disabled" title="Coming soon">Industrials</button>
    <button class="subsection-link disabled" title="Coming soon">Energy</button>
    <button class="subsection-link disabled" title="Coming soon">Healthcare</button>
    <button class="subsection-link disabled" title="Coming soon">Consumer Retail</button>
    <button class="subsection-link disabled" title="Coming soon">FIG</button>
  </div>
</nav>

<div class="wrap">
  <main>

    <div class="section-hdr" id="section-hdr">
      <div class="section-kicker" id="section-kicker">M&amp;A Activity · Construction Materials</div>
      <h2 class="section-headline" id="section-headline">The Deal Room</h2>
      <div class="region-toggle" id="region-toggle" role="tablist" aria-label="Geographic scope">
        <button class="region-btn on" data-region="US" onclick="switchRegion('US',this)" role="tab" aria-selected="true">
          United States <span class="region-count" id="rc-us">0</span>
        </button>
        <button class="region-btn" data-region="Global" onclick="switchRegion('Global',this)" role="tab" aria-selected="false">
          Global <span class="region-count" id="rc-gl">0</span>
        </button>
      </div>
    </div>

    <div class="search-bar">
      <input class="search-input" id="search" type="text" placeholder="Search by company, keyword, or sector…" oninput="applySearch()">
      <div class="search-icon">Search</div>
    </div>

    <div class="feed-meta-row">
      <div class="feed-label">The Ledger</div>
      <div class="feed-count" id="feed-count">— Entries</div>
    </div>

    <div id="notice" style="display:none"></div>
    <div id="feed"></div>
  </main>

  <aside class="sidebar" id="sidebar">

    <div class="panel">
      <div class="ph">Article Count <span class="ph-ornament">◆</span></div>
      <div class="count-box">
        <div class="count-n" id="s-tot">—</div>
        <div class="count-l">Total Entries</div>
      </div>
    </div>

    <div class="panel">
      <div class="ph">By Classification <span class="ph-ornament">◆</span></div>
      <div style="padding:1px;background:var(--rule-soft)">
        <div class="fl" id="tf">
          <button class="fb on" onclick="filt('all',this,'t')">All Classes <span class="fc" id="fc-all">0</span></button>
          <button class="fb" onclick="filt('Acquisition',this,'t')">Acquisitions <span class="fc" id="fc-acq">0</span></button>
          <button class="fb" onclick="filt('Merger',this,'t')">Mergers <span class="fc" id="fc-mer">0</span></button>
          <button class="fb" onclick="filt('Investment',this,'t')">Investments <span class="fc" id="fc-inv">0</span></button>
          <button class="fb" onclick="filt('Divestiture',this,'t')">Divestitures <span class="fc" id="fc-div">0</span></button>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="ph">By Sector <span class="ph-ornament">◆</span></div>
      <div style="padding:1px;background:var(--rule-soft)">
        <div class="fl" id="sf">
          <button class="fb on" onclick="filt('all',this,'s')">All Sectors</button>
          <button class="fb" onclick="filt('Aggregates',this,'s')">Aggregates</button>
          <button class="fb" onclick="filt('Asphalt',this,'s')">Asphalt</button>
          <button class="fb" onclick="filt('Ready-Mix',this,'s')">Ready-Mix</button>
          <button class="fb" onclick="filt('Cement',this,'s')">Cement</button>
          <button class="fb" onclick="filt('Paving',this,'s')">Paving</button>
          <button class="fb" onclick="filt('Precast',this,'s')">Precast Concrete</button>
        </div>
      </div>
    </div>

  </aside>
</div>

<footer class="footer">
  <div class="footer-mark">— The Meridian Report —</div>
  <div class="footer-est">A Private Compendium</div>
</footer>

<script>
const GITHUB_USER = "DylanWhitehead33";
const GITHUB_REPO = "ma-monitor";
const DATA_URL = `https://${GITHUB_USER}.github.io/${GITHUB_REPO}/articles.json`;

let articles = [], tf = 'all', sf = 'all', rf = 'US', searchQuery = '', activeSection = 'ma', activeIndustry = 'construction';

document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

function setRibbonStatus(text, state){
  const el = document.getElementById('ribbon-status');
  if(!text){ el.classList.remove('visible','error'); return; }
  el.textContent = text;
  el.classList.add('visible');
  if(state === 'error') el.classList.add('error');
  else el.classList.remove('error');
}

function showNotice(html,type){const el=document.getElementById('notice');if(!html){el.style.display='none';return;}el.className='notice '+(type||'info');el.innerHTML=html;el.style.display='block';}

function switchSection(section){
  activeSection = section;
  document.querySelectorAll('.section-link').forEach(b=>b.classList.remove('active'));
  document.querySelector(`[data-section="${section}"]`).classList.add('active');
  document.getElementById('subsection-nav').style.display = (section === 'ma') ? 'block' : 'none';
  render();
}

function switchIndustry(ind){
  activeIndustry = ind;
  document.querySelectorAll('.subsection-link').forEach(b=>b.classList.remove('active'));
  document.querySelector(`[data-industry="${ind}"]`).classList.add('active');
  render();
}

function switchRegion(region, btn){
  rf = region;
  document.querySelectorAll('.region-btn').forEach(b=>{
    b.classList.remove('on');
    b.setAttribute('aria-selected','false');
  });
  btn.classList.add('on');
  btn.setAttribute('aria-selected','true');
  updateStats();
  render();
}

function filt(val,btn,group){
  if(group==='t'){tf=val;document.getElementById('tf').querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));}
  else{sf=val;document.getElementById('sf').querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));}
  btn.classList.add('on');
  render();
}

function applySearch(){
  searchQuery = document.getElementById('search').value.toLowerCase().trim();
  render();
}

function updateStats(){
  // Region badge counts reflect the whole dataset
  const usCount = articles.filter(a=>a.region==='US').length;
  const glCount = articles.filter(a=>a.region!=='US').length;
  const rcUs = document.getElementById('rc-us'); if(rcUs) rcUs.textContent = usCount;
  const rcGl = document.getElementById('rc-gl'); if(rcGl) rcGl.textContent = glCount;

  // Sidebar stats reflect the CURRENT region — that's the working set
  const inRegion = articles.filter(a => (rf==='US' ? a.region==='US' : a.region!=='US'));
  const n=inRegion.length;
  document.getElementById('s-tot').textContent=n;
  document.getElementById('fc-all').textContent=n;
  document.getElementById('fc-acq').textContent=inRegion.filter(a=>a.dealType==='Acquisition').length;
  document.getElementById('fc-mer').textContent=inRegion.filter(a=>a.dealType==='Merger').length;
  document.getElementById('fc-inv').textContent=inRegion.filter(a=>a.dealType==='Investment').length;
  document.getElementById('fc-div').textContent=inRegion.filter(a=>a.dealType==='Divestiture').length;
}

function render(){
  const el=document.getElementById('feed');

  if(activeSection !== 'ma'){
    el.innerHTML = `<div class="empty"><h2>Chapter in preparation</h2><div class="ornament-line">◆ ◆ ◆</div><p>This section is being curated. New chapters will be added as The Meridian Report expands.</p></div>`;
    document.getElementById('feed-count').textContent = '— Entries';
    return;
  }

  if(activeIndustry !== 'construction'){
    el.innerHTML = `<div class="empty"><h2>Industry in preparation</h2><div class="ornament-line">◆ ◆ ◆</div><p>Coverage of this industry is being curated. Construction Materials coverage is live; additional verticals will follow.</p></div>`;
    document.getElementById('feed-count').textContent = '— Entries';
    return;
  }

  let list=articles;
  // Region filter (US vs Global) — applied first so counts/empty-states reflect it
  list = list.filter(a => rf === 'US' ? a.region === 'US' : a.region !== 'US');
  if(tf!=='all')list=list.filter(a=>a.dealType===tf);
  if(sf!=='all')list=list.filter(a=>a.sector&&a.sector.toLowerCase().includes(sf.toLowerCase()));
  if(searchQuery){
    list=list.filter(a=>{
      const blob=(a.title+' '+a.summary+' '+a.source+' '+(a.category||'')+' '+(a.keywords||'')+' '+(a.sector||'')).toLowerCase();
      return blob.includes(searchQuery);
    });
  }

  document.getElementById('feed-count').textContent = list.length + ' ' + (list.length===1?'Entry':'Entries');

  if(list.length===0){
    el.innerHTML=`<div class="empty"><h2>${articles.length===0?'The ledger awaits':searchQuery?'No entries match that query':'No entries in this view'}</h2><div class="ornament-line">◆ ◆ ◆</div><p>${articles.length===0?'The daily cycle runs at 08:00 Central. Press Refresh to pull the latest dispatches.':searchQuery?'Try different search terms, or clear the query to view all entries.':'Adjust the filters to widen the scope.'}</p></div>`;
    return;
  }

  const typeMap={Acquisition:{cls:'ta',pc:'prio-a'},Merger:{cls:'tm',pc:'prio-m'},Investment:{cls:'ti',pc:'prio-i'},Divestiture:{cls:'td',pc:'prio-d'}};

  el.innerHTML=list.map((a,i)=>{
    const t=typeMap[a.dealType]||typeMap.Acquisition;
    const kw=(a.keywords||'').split(',').filter(k=>k.trim()).map(k=>`<span class="kw">${k.trim()}</span>`).join('');
    return `<article class="card ${t.cls}" style="animation-delay:${Math.min(i*25,400)}ms">
      <div class="card-top">
        <span class="prio ${t.pc}">${a.dealType||'Deal'}</span>
        ${a.sector?`<span class="sector-tag">${a.sector}</span>`:''}
        ${a.value?`<span class="value-stamp">${a.value}</span>`:''}
        <span class="card-date">${a.date||''}</span>
      </div>
      <h3 class="card-title">${a.title}</h3>
      <div class="card-summary">${a.summary}</div>
      ${kw?`<div class="card-kw"><span class="kw-lbl">Signals</span>${kw}</div>`:''}
      <div class="card-foot">
        <span class="src-name">${a.source||'Unknown'}</span>
        ${a.category?`<span class="card-cat">via ${a.category}</span>`:''}
        ${a.url?`<a class="card-link" href="${a.url}" target="_blank" rel="noopener">Read →</a>`:''}
      </div>
    </article>`;
  }).join('');
}

async function loadArticles(){
  const btn=document.getElementById('rbtn');
  btn.disabled=true;
  btn.classList.add('loading');
  showNotice('');
  setRibbonStatus('Retrieving…');
  try{
    const resp=await fetch(DATA_URL+'?t='+Date.now(),{signal:AbortSignal.timeout(20000)});
    if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
    const data=await resp.json();
    articles=Array.isArray(data.articles)?data.articles:[];
    updateStats();render();
    const fetched=data.fetchedAt?new Date(data.fetchedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):'';
    setRibbonStatus(`Updated ${fetched}`);
    if(data.newToday>0)showNotice(`<strong>${data.newToday}</strong> new ${data.newToday!==1?'entries':'entry'} added to the ledger this cycle.`,'info');
  }catch(e){
    setRibbonStatus('Unable to retrieve','error');
    showNotice(`<strong>Unable to retrieve dispatches:</strong> ${e.message}. Verify GitHub Pages is active and the data file has been generated.`,'err');
  }
  btn.disabled=false;
  btn.classList.remove('loading');
}

window.addEventListener('DOMContentLoaded',loadArticles);
</script>
</body>
</html>
